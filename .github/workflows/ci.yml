name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run hygiene
      - run: npm run scaffold:smoke
      - run: git diff --check
      - run: git diff --exit-code

  plugins:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Design Doctrine
            package: bb-plugin-design-doctrine
            path: plugins/design-doctrine
          - name: Improve Prompt
            package: bb-plugin-prompt-shaper
            path: plugins/improve-prompt
          - name: Omegacode
            package: bb-plugin-omega
            path: plugins/omegacode
          - name: Thread Hover Cards
            package: bb-plugin-thread-hover-cards
            path: plugins/thread-hover-cards
          - name: UI Patterns
            package: bb-plugin-ui-patterns
            path: plugins/ui-patterns
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck --workspace=${{ matrix.package }}
      - run: npm run build --workspace=${{ matrix.package }}
      - run: npm test --workspace=${{ matrix.package }}
      - run: npm run test:built --workspace=${{ matrix.package }} --if-present
      - run: node tooling/validate-plugin-artifacts.mjs ${{ matrix.path }}
      - run: git diff --check -- ${{ matrix.path }}
      - run: git diff --exit-code -- ${{ matrix.path }}

  install-refs:
    needs: [hygiene, plugins]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run artifacts
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - if: github.event_name == 'pull_request'
        run: node tooling/publish-install-refs.mjs
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node tooling/publish-install-refs.mjs --push

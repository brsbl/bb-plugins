name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.matrix.outputs.plugins }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        run: |
          echo "plugins=$(node tooling/plugin-workspaces.mjs)" >> "$GITHUB_OUTPUT"

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run hygiene
      - run: npm run scaffold:smoke
      - run: git diff --check
      - run: git diff --exit-code

  plugins:
    needs: inventory
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.inventory.outputs.plugins) }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck --workspace=${{ matrix.package }}
      - run: npm run build --workspace=${{ matrix.package }}
      - run: npm test --workspace=${{ matrix.package }}
      - run: npm run test:built --workspace=${{ matrix.package }} --if-present
      - run: node tooling/validate-plugin-artifacts.mjs ${{ matrix.path }}
      - run: git diff --check -- ${{ matrix.path }}
      - run: git diff --exit-code -- ${{ matrix.path }}

  install-refs-validation:
    if: github.event_name == 'pull_request'
    needs: [hygiene, plugins]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run artifacts
      - run: node tooling/publish-install-refs.mjs

  publish-install-refs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [hygiene, plugins]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run artifacts
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: node tooling/publish-install-refs.mjs --push
